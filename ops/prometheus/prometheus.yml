# Prometheus scrape config for the local Aegis stack.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: aegis-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: celery
    static_configs:
      - targets: ["celery-exporter:9808"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
