# Local development stack for Aegis.
#   docker compose up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
      # Install the Strix engine into the worker image only.
      args:
        INSTALL_STRIX: "true"
    command: celery -A app.workers.celery_app.celery worker --loglevel=info
    env_file: ./backend/.env
    depends_on:
      - api
      - redis
    volumes:
      - ./backend:/app
      # Strix runs sibling Docker containers, so mount the host Docker socket.
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  pgdata:
