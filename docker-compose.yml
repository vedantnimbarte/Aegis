# Local development stack for Aegis.
#   docker compose up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
      # Install the Strix engine into the worker image only.
      args:
        INSTALL_STRIX: "true"
    # `-E` emits task events for the Prometheus celery-exporter.
    command: celery -A app.workers.celery_app.celery worker --loglevel=info -E
    env_file: ./backend/.env
    environment:
      # Strix spawns its sandbox containers on the isolated dind daemon rather
      # than the host socket, so an escape can't reach the host's Docker/root.
      DOCKER_HOST: tcp://dind:2375
    depends_on:
      - api
      - redis
      - dind
    volumes:
      - ./backend:/app
      # Shared with dind so Strix's bind-mounts of the checkout resolve in both.
      - scandata:/tmp/aegis-scans

  # Isolated Docker daemon for Strix's sandbox containers (see SECURITY.md).
  # Running untrusted target code here contains a breakout to this container
  # instead of the host. It is privileged — for stronger isolation in
  # production, front it with rootless Docker / sysbox / gVisor and restrict
  # egress to the LLM + OSINT endpoints only.
  dind:
    image: docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""   # plain TCP on the internal network only
    volumes:
      - scandata:/tmp/aegis-scans

  # Celery Beat — ticks periodically and dispatches due recurring scans.
  beat:
    build: ./backend
    command: celery -A app.workers.celery_app.celery beat --loglevel=info
    env_file: ./backend/.env
    depends_on:
      - redis
      - db

  # Next.js dashboard — dev server with hot reload. The source is bind-mounted
  # and node_modules lives in a named volume (so the host's copy never shadows
  # the container's). NEXT_PUBLIC_API_BASE_URL must be the URL the browser hits
  # on the host, not the in-network `api` hostname.
  dashboard:
    image: node:20-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3001:3001"
    volumes:
      - ./dashboard:/app
      - dashboard_node_modules:/app/node_modules
    depends_on:
      - api

  # --- Observability -----------------------------------------------------
  # Scrapes Celery task events off the Redis broker and exports Prometheus
  # metrics (scan throughput, failures, runtime).
  celery-exporter:
    image: danihodovic/celery-exporter:latest
    environment:
      CE_BROKER_URL: redis://redis:6379/0
    depends_on:
      - redis

  prometheus:
    image: prom/prometheus:latest
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api
      - celery-exporter

  grafana:
    image: grafana/grafana:latest
    environment:
      # Dev-only default admin creds — change for any shared deployment.
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3002:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  dashboard_node_modules:
  promdata:
  grafanadata:
  scandata:
