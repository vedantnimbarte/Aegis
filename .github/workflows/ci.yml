# CI — runs backend unit tests and type-checks the dashboard on every push/PR.
# Deploy is intentionally out of scope here: hosting is provider-specific
# (see README "Deployment") and needs cloud credentials this repo doesn't hold.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # strix-agent is worker-only and not needed for the unit tests.
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest -q

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run typecheck
